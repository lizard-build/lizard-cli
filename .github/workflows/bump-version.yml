name: Auto bump version and release

on:
  push:
    branches:
      - main

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump patch version
        id: bump
        run: |
          # Read current version from package.json
          CURRENT=$(node -p "require('./package.json').version")
          echo "Current version: $CURRENT"

          # Bump patch: 0.1.10 → 0.1.11
          IFS='.' read -r MAJ MIN PAT <<< "$CURRENT"
          NEW="$MAJ.$MIN.$((PAT + 1))"
          echo "New version: $NEW"
          echo "version=$NEW" >> $GITHUB_OUTPUT

          # Update package.json
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$NEW';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

          # Update CURRENT_VERSION in updater.ts
          sed -i "s/export const CURRENT_VERSION = \".*\"/export const CURRENT_VERSION = \"$NEW\"/" src/lib/updater.ts

      - name: Commit and tag
        run: |
          VERSION=${{ steps.bump.outputs.version }}
          git add package.json src/lib/updater.ts
          git commit -m "chore: bump version to v$VERSION [skip ci]"
          git tag "v$VERSION"
          git push origin main --tags
